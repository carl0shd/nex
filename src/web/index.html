<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nex</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #shell {
        position: fixed;
        inset: 0;
        background: #0a0a0a;
        border-radius: 10px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 0;
      }
      #shell-titlebar {
        height: 47px;
        -webkit-app-region: drag;
        border-bottom: 1px solid #1f1f1f;
        flex-shrink: 0;
      }
      #root {
        position: fixed;
        inset: 0;
        z-index: 1;
      }
      #root:empty {
        display: none;
      }
      /* Vite error overlay */
      vite-error-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="shell">
      <div id="shell-titlebar"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
